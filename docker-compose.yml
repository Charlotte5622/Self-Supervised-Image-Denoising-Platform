services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: denoising-platform
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      DJANGO_SETTINGS_MODULE: denoising_platform.settings
      DJANGO_DEBUG: "${DJANGO_DEBUG:-True}"
      DJANGO_SECRET_KEY: "${DJANGO_SECRET_KEY:-dev-change-me}"
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./media:/app/media
      - ./models:/app/models
    restart: unless-stopped
